<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cat facts</title>
    <link rel="icon" type="image/png" href="favicon/favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="favicon/favicon-16x16.png" sizes="16x16">

    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body>
    <div class="sky" id="sky"></div>
    <div class="stage">
        <div class="title-row">
            <div class="title">cat facts</div>
        </div>
        <div class="counter" id="counter">
            fact 1 of 18
        </div>
        <div class="card" id="card">
            <div class="fact" id="fact">
                Cats sleep a lot
            </div>
        </div>
            <div class="dots" id="dots"></div>
            <button class="next-btn" id="nextBtn">next fact</button>
            <div class="hint">press <kbd>space</kbd> for the next fact</div>
            <div class="catwrap">
                <div class="catbox" id="catbox">
                    <div class="meow-bubble" id="meowBubble">meow!</div>
                    <img class="catimg" id="catimg" src="images/cat.png" alt="kitty cat">
                </div>
                <div class="cat-caption">psst, click me!</div>
            </div>

        </div>
   

</body>
</html>
